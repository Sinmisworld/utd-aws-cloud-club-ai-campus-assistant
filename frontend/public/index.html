<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UTD AI Campus Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <div class="bg-gradient"></div>

    <section class="container">
      <header class="brand-card">
        <div class="brand-left">
          <img src="utd-logo.jpg" alt="UTD logo" class="brand-logo" />
          <div>
            <h1>AI Campus Assistant</h1>
            <p>Richardson, Dallas, Texas</p>
          </div>
        </div>
      </header>

      <section class="chat-card" aria-label="UTD chatbot">
        <div class="chat-toolbar">
          <span id="statusText" class="status">Ready</span>
          <button class="btn btn-secondary" id="clearBtn" type="button">Clear</button>
        </div>

        <div class="chat-body">
          <div class="prompt-group" id="promptGroup">
            <p class="prompt-label">Try one of these:</p>
            <div class="chip-row">
              <button type="button" class="chip" data-prompt="Where can I get vegetarian lunch near ECSS?">Dining near ECSS</button>
              <button type="button" class="chip" data-prompt="What events are happening today?">Events today</button>
              <button type="button" class="chip" data-prompt="Where can I park near ECSW?">Parking near ECSW</button>
            </div>
          </div>

          <div id="chat" class="chat-log" aria-live="polite"></div>
        </div>

        <form class="composer" id="composerForm">
          <label for="messageInput" class="sr-only">Message</label>
          <textarea id="messageInput" placeholder="Ask about events, dining, parking, classes..." rows="1"></textarea>
          <button class="btn btn-primary" id="sendBtn" type="submit">Send</button>
        </form>
      </section>

      <footer class="footer">
        <a
          href="https://github.com/Sinmisworld/utd-aws-cloud-club-ai-campus-assistant"
          target="_blank"
          rel="noopener noreferrer"
        >
          UTD AWS Cloud Club
        </a>
      </footer>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
